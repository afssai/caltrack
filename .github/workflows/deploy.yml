# GitHub Pages deployment — DISABLED
# The app runs on your local Node server (server.mjs) at http://192.168.100.43:4173
# GitHub Pages does not support the Node API endpoints (Gemini, food search, etc.)
# To re-enable: remove the `if: false` line from the job below.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: false   # ← deployment disabled — app requires local Node server
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_SUPABASE_URL: https://mlztungodoqofuvykwpt.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_UniP_Kg7abiZg4nv5cn6lg_Lph_Rhc6
        run: npm run build

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
